spring.application.name=expenses-backend

# ===============================
# Server
# ===============================
server.port=${SERVER_PORT:8080}

# ===============================
# MySQL DataSource
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3310/expensio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:expensio_user}
spring.datasource.password=${DB_PASSWORD:expensio_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# Logging
# ===============================
logging.level.root=WARN
logging.level.com.expense.tracker=INFO

# ===============================
# HikariCP Connection Pool
# ===============================
spring.datasource.hikari.pool-name=ExpensioHikariCP
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# JWT Security
# ===============================
application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# Email (SMTP / Gmail)
# ===============================
