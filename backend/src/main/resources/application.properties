spring.application.name=expenses-backend

# ==============================================================================
# Server Configuration
# ==============================================================================
server.port=${SERVER_PORT:8080}

# ==============================================================================
# Database Configuration (MySQL)
# ==============================================================================
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/expensio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:expensio_user}
spring.datasource.password=${DB_PASSWORD:expensio_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==============================================================================
# Security Configuration (JWT)
# ==============================================================================
# The JWT secret must be provided via the JWT_SECRET environment variable.
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

# ==============================================================================
# Email Configuration (SMTP)
# ==============================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==============================================================================
# External Services (Twilio SMS)
# ==============================================================================
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}

# ==============================================================================
# Infrastructure & Logging
# ==============================================================================
# Logging
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.expense.tracker=${LOG_LEVEL_APP:INFO}

# HikariCP Connection Pool
spring.datasource.hikari.pool-name=ExpensioHikariCP
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
