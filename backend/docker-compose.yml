version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: expense-mysql
    restart: always
    environment:
      MYSQL_DATABASE: expensio
      MYSQL_USER: expensio_user
      MYSQL_PASSWORD: expensio_pass
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
