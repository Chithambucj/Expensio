version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: expense-mysql
    restart: always
    environment:
      MYSQL_DATABASE: expensio
      MYSQL_USER: expensio_user
      MYSQL_PASSWORD: expensio_pass
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense-backend
    restart: always
    ports:
      - "8081:8080"
    env_file:
      - ./backend/.env
    environment:
      # Override the DB_URL from .env to use the internal docker network host and port
      - DB_URL=jdbc:mysql://db:3306/expensio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
