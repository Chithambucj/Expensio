version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: expense-mysql
    restart: always
    environment:
      MYSQL_DATABASE: expensio
      MYSQL_USER: expensio_user
      MYSQL_PASSWORD: expensio_pass
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense-backend
    restart: always
    ports:
      - "8081:8080"
    env_file:
      - .env
    depends_on:
      - mysql

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
