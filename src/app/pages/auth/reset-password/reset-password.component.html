<div class="auth-pages animate-fade-in">
    <div class="auth-box shadow-card">
        <div class="auth-header">
            <div class="logo-box">
                <lucide-icon name="lock" size="32" class="logo-icon"></lucide-icon>
            </div>
            <h1>Reset Password</h1>
            <p class="subtitle">Please enter your new password below.</p>
        </div>

        <form (ngSubmit)="onSubmit()" #resetForm="ngForm" class="auth-form mt-4">
            <div class="form-group">
                <label for="newPassword">
                    <lucide-icon name="key" size="16"></lucide-icon>
                    New Password
                </label>
                <div class="input-wrapper">
                    <input type="password" id="newPassword" [(ngModel)]="newPassword" name="newPassword" required
                        minlength="6" placeholder="••••••••" class="form-input" #passInput="ngModel">
                </div>
                @if (passInput.invalid && passInput.touched) {
                <span class="error-text">Password must be at least 6 characters</span>
                }
            </div>

            <div class="form-group">
                <label for="confirmPassword">
                    <lucide-icon name="check" size="16"></lucide-icon>
                    Confirm Password
                </label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword"
                        required placeholder="••••••••" class="form-input" #confirmInput="ngModel">
                </div>
                @if (confirmInput.touched && newPassword !== confirmPassword) {
                <span class="error-text">Passwords do not match</span>
                }
            </div>

            @if (message()) {
            <div class="alert mt-4" [class.alert-error]="isError()" [class.alert-success]="!isError()">
                <lucide-icon [name]="isError() ? 'alert-circle' : 'check-circle'" size="18"></lucide-icon>
                <span>{{ message() }}</span>
            </div>
            }

            <button type="submit" class="btn btn-primary auth-btn mt-6"
                [disabled]="resetForm.invalid || isSubmitting() || newPassword !== confirmPassword || !token">
                @if (isSubmitting()) {
                <div class="spinner spinner-small"></div>
                <span>Resetting...</span>
                } @else {
                <lucide-icon name="check" size="18"></lucide-icon>
                <span>Reset Password</span>
                }
            </button>
        </form>
    </div>
</div>
